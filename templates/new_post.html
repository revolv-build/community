{% extends "base.html" %}
{% block title %}{{ 'Edit Post' if post else 'New Post' }} - Community{% endblock %}
{% block content %}
<div class="page-mid">
  <h1>{{ 'Edit Post' if post else 'New Post' }}</h1>
  <div class="sub">Share something with the community</div>

  <div class="card">
    <form method="POST">
      <div class="field">
        <div class="label">Title</div>
        <input name="title" value="{{ post.title if post else '' }}" placeholder="What's on your mind?" required autofocus />
      </div>
      <div class="field">
        <div class="label">Body</div>
        <textarea name="body" style="min-height:200px;" placeholder="Write your post...">{{ post.body if post else '' }}</textarea>
      </div>
      <div class="flex gap-8">
        <button class="btn btn-primary">{{ 'Update' if post else 'Publish' }}</button>
        <a href="{{ '/posts/' ~ post.id if post else '/' }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
