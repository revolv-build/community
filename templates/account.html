{% extends "base.html" %}
{% block title %}Account - Community{% endblock %}
{% block content %}
<div class="page" style="max-width:560px;">
  <h1>Account</h1>
  <div class="sub">Update your details</div>

  <div class="card">
    <h2>Profile</h2>
    <form method="POST" action="/account/profile">
      <div class="field"><div class="label">Name</div><input name="name" value="{{ user.name }}" required /></div>
      <div class="field"><div class="label">Email</div><input name="email" type="email" value="{{ user.email }}" required /></div>
      <div class="field"><div class="label">Bio</div><textarea name="bio" placeholder="Tell the community about yourself...">{{ user.bio or '' }}</textarea></div>
      <div class="field"><div class="label">Location</div><input name="location" value="{{ user.location or '' }}" placeholder="e.g. London, UK" /></div>
      <div class="field"><div class="label">Website</div><input name="website" value="{{ user.website or '' }}" placeholder="https://..." /></div>
      <button class="btn btn-primary">Save Profile</button>
    </form>
  </div>

  <div class="card">
    <h2>Change Password</h2>
    <form method="POST" action="/account/password">
      <div class="field"><div class="label">Current password</div><input name="current" type="password" required /></div>
      <div class="field"><div class="label">New password</div><input name="new" type="password" required /></div>
      <button class="btn btn-primary">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
